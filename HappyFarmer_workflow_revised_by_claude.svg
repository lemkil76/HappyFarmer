mp + pH</text><rect x="270" y="360" width="130" height="54" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/><text x="335" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#fff">Water pump</text><text x="335" y="398" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9FE1CB">30 min on / 15 off</text><rect x="130" y="360" width="130" height="54" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/><text x="195" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#fff">Grow lights</text><text x="195" y="398" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9FE1CB">5 hrs nightly</text><rect x="410" y="360" width="130" height="54" rx="8" fill="#7F77DD" stroke="#534AB7" stroke-width="0.5"/><text x="475" y="378" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#fff">Capture images</text><text x="475" y="396" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#CECBF6">low-res 24x/day, hi-res daily</text><rect x="555" y="270" width="100" height="54" rx="8" fill="#7F77DD" stroke="#534AB7" stroke-width="0.5"/><text x="605" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#fff">Post update</text><text x="605" y="308" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#CECBF6">every 4th day</text><line x1="530" y1="322" x2="530" y2="297" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/><line x1="530" y1="297" x2="555" y2="297" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="470" y="360" width="130" height="54" rx="8" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/><text x="535" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#fff">Fan control</text><text x="535" y="398" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#F5C4B3">heat/cool 30 mi