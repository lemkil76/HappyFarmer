<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HappyFarmer Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;padding:16px}
.dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:960px;margin:0 auto}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:14px 16px}
.card-label{font-size:11px;color:#888;font-weight:500;letter-spacing:0.04em;margin-bottom:6px;text-transform:uppercase}
.card-val{font-size:26px;font-weight:500;color:#1a1a1a;line-height:1.1}
.card-sub{font-size:12px;color:#666;margin-top:4px}
.card-trend{font-size:12px;margin-top:4px}
.ok{color:#1D9E75}.warn{color:#BA7517}.danger{color:#E24B4A}
.span2{grid-column:span 2}.span3{grid-column:span 3}
.hbar{height:6px;border-radius:3px;background:#eee;margin-top:8px;overflow:hidden}
.hbar-fill{height:100%;border-radius:3px;transition:width 0.5s}
.img-placeholder{background:#f5f5f3;border-radius:8px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;border:0.5px solid #ddd}
.tweet-card{border-left:2px solid #378ADD;padding-left:12px;margin-bottom:10px}
.tweet-text{font-size:13px;color:#1a1a1a;line-height:1.5}
.tweet-meta{font-size:11px;color:#888;margin-top:4px}
.schedule-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid #eee;font-size:13px}
.schedule-row:last-child{border-bottom:none}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.pill-active{background:#e1f5ee;color:#0F6E56}
.pill-next{background:#f5f5f3;color:#666}
.pill-done{background:#f5f5f3;color:#aaa}
.header{grid-column:span 3;display:flex;align-items:center;justify-content:space-between;padding:8px 0 4px}
.header h1{font-size:16px;font-weight:500}
.sparkline{display:flex;align-items:flex-end;gap:3px;height:36px;margin-top:10px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
.status-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:3px 0}
.loading{color:#aaa;font-size:13px;text-align:center;padding:40px 0}
.error-banner{background:#fcebeb;border:0.5px solid #f09595;border-radius:8px;padding:10px 14px;font-size:12px;color:#791F1F;grid-column:span 3;display:none}
button{font-size:12px;padding:6px 14px;cursor:pointer;border:0.5px solid #ccc;border-radius:8px;background:#fff;margin-top:10px}
button:hover{background:#f5f5f3}
</style>
</head>
<body>
<div class="dash" id="dash">
  <div class="span3 loading" id="loading">Laddar data...</div>
  <div class="error-banner" id="error-banner"></div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────

function fmt(val, decimals=1, fallback='–') {
  return val !== null && val !== undefined ? Number(val).toFixed(decimals) : fallback;
}

function statusColor(val, min, max) {
  if (val === null || val === undefined) return '';
  if (val < min) return 'warn';
  if (val > max) return 'danger';
  return 'ok';
}

function statusDot(val, min, max) {
  const c = statusColor(val, min, max);
  const labels = { ok: '● Normal', warn: '● För lågt', danger: '● För högt', '': '● Okänd' };
  return `<span class="${c}">${labels[c]}</span>`;
}

function pillClass(status) {
  if (status === 'active') return 'pill-active';
  if (status === 'done')   return 'pill-done';
  return 'pill-next';
}

function pillLabel(status) {
  if (status === 'active') return 'Aktiv';
  if (status === 'done')   return 'Klar';
  return 'Nästa';
}

function relayPill(state) {
  const on = state === 'on';
  return `<span class="pill ${on ? 'pill-active' : 'pill-done'}">${on ? 'ON' : 'OFF'}</span>`;
}

function sparkline(values, color) {
  if (!values || !values.length) return '';
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = max - min || 1;
  return values.map(v => {
    const h = Math.round(8 + ((v - min) / range) * 28);
    return `<div style="flex:1;height:${h}px;border-radius:2px 2px 0 0;background:${color};opacity:0.75"></div>`;
  }).join('');
}

function formatTimestamp(iso) {
  if (!iso) return '–';
  const d = new Date(iso);
  return d.toLocaleString('sv-SE', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatDate(iso) {
  if (!iso) return '–';
  return new Date(iso).toLocaleString('sv-SE', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// ── Render ───────────────────────────────────────────────────────────────────

function render(d) {
  const r   = d.current_readings;
  const thr = d.thresholds;
  const act = d.actuator_states;
  const sys = d.system;
  const img = d.latest_image;
  const sch = d.light_schedule;
  const soc = d.social_media;
  const his = d.sensor_history;
  const pump= d.pump_schedule;
  const sum = d.daily_summary;

  document.getElementById('dash').innerHTML = `

    <!-- Header -->
    <div class="header">
      <h1>HappyFarmer — live overview</h1>
      <span style="font-size:12px;color:#888">
        Uppdaterad: ${formatDate(r.timestamp)}
        &nbsp;|&nbsp; Loop #${sys.loop_count.toLocaleString('sv-SE')}
        &nbsp;|&nbsp; <span style="color:${sys.drive_sync_status==='synced'?'#1D9E75':'#E24B4A'}">${sys.drive_sync_status === 'synced' ? '✓ Synkad' : '⚠ Ej synkad'}</span>
      </span>
    </div>

    <!-- Senaste bild -->
    <div class="card span2">
      <div class="card-label">Senaste bild</div>
      <div class="img-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
        <span style="font-size:12px;color:#aaa">${img.resolution}</span>
      </div>
      <div style="font-size:11px;color:#aaa;margin-top:6px">
        Tagen: ${formatDate(img.captured_at)}
        &nbsp;|&nbsp; ${img.filename}
      </div>
    </div>

    <!-- Lufttemp + Vattentemp -->
    <div class="card" style="display:flex;flex-direction:column;gap:10px">
      <div>
        <div class="card-label">Lufttemperatur</div>
        <div class="card-val">${fmt(r.air_temperature_c)}°C</div>
        <div class="card-sub">Fuktighet: ${fmt(r.humidity_pct, 0)}%</div>
        <div class="card-trend">${statusDot(r.air_temperature_c, thr.temp_min_c, thr.temp_max_c)}</div>
        <div class="sparkline">${sparkline(his.air_temperature_c, '#D85A30')}</div>
      </div>
      <div style="border-top:0.5px solid #eee;padding-top:10px">
        <div class="card-label">Vattentemperatur</div>
        <div class="card-val">${fmt(r.water_temperature_c)}°C</div>
        <div class="card-sub">pH: ${fmt(r.ph, 1)}</div>
        <div class="card-trend">${statusDot(r.water_temperature_c, thr.temp_min_c, thr.temp_max_c)}</div>
        <div class="sparkline">${sparkline(his.water_temperature_c, '#378ADD')}</div>
      </div>
    </div>

    <!-- Lux + Fuktighet -->
    <div class="card">
      <div class="card-label">Luxtal</div>
      <div class="card-val">${r.lux !== null ? r.lux.toLocaleString('sv-SE') : '–'}</div>
      <div class="card-sub">${r.lux_description} — ljus ${act.grow_lights === 'on' ? 'ON' : 'OFF'}</div>
      <div class="hbar">
        <div class="hbar-fill" style="width:${Math.min(100, Math.round((r.lux/thr.lux_max)*100))}%;background:#EF9F27"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:#aaa">
        <span>0</span><span>${thr.lux_max.toLocaleString('sv-SE')} lux</span>
      </div>
      <div style="margin-top:14px">
        <div class="card-label">Luftfuktighet</div>
        <div class="card-val">${fmt(r.humidity_pct, 0)}%</div>
        <div class="hbar" style="margin-top:8px">
          <div class="hbar-fill" style="width:${Math.min(100, Math.round(r.humidity_pct))}%;background:#1D9E75"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:#aaa">
          <span>0%</span><span>100%</span>
        </div>
      </div>
    </div>

    <!-- Bevattningsschema -->
    <div class="card">
      <div class="card-label">Pump &amp; ljusschema</div>
      ${sch.today.map(s => `
        <div class="schedule-row">
          <span class="dot" style="background:${s.status==='active'?'#1D9E75':s.status==='done'?'#ccc':'#EF9F27'}"></span>
          <span style="flex:1;color:#666">${s.start} – ${s.end}</span>
          <span style="color:#888;font-size:11px;flex:1">${s.label}</span>
          <span class="pill ${pillClass(s.status)}">${pillLabel(s.status)}</span>
        </div>
      `).join('')}
      <div style="margin-top:12px;padding-top:10px;border-top:0.5px solid #eee">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#666">
          <span>Pump ON</span><span style="font-weight:500">${pump.on_seconds/60} min</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-top:4px">
          <span>Pump OFF (luftning)</span><span style="font-weight:500">${pump.off_seconds/60} min</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-top:4px">
          <span>Nästa cykel om</span><span style="font-weight:500">${pump.next_cycle_in_minutes} min</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#666;margin-top:4px">
          <span>Cykler idag</span><span style="font-weight:500">${pump.cycles_today}</span>
        </div>
      </div>
    </div>

    <!-- Senaste inlägg -->
    <div class="card span2">
      <div class="card-label">Senaste inlägg — ${soc.platform} ${soc.handle}</div>
      ${soc.recent_posts.map(p => `
        <div class="tweet-card">
          <div class="tweet-text">${p.text.replace(/\n/g,'<br>').replace(/#(\w+)/g,'<span style="color:#378ADD">#$1</span>')}</div>
          <div class="tweet-meta">${formatTimestamp(p.posted_at)} &middot; ${p.likes} gilla${p.retweets ? ' &middot; ' + p.retweets + ' retweets' : ''}</div>
        </div>
      `).join('')}
    </div>

    <!-- Systemstatus -->
    <div class="card">
      <div class="card-label">Systemstatus</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
        <div class="status-row"><span style="color:#666">Pump</span>${relayPill(act.pump)}</div>
        <div class="status-row"><span style="color:#666">Odlingsljus</span>${relayPill(act.grow_lights)}</div>
        <div class="status-row"><span style="color:#666">Fläkt</span>${relayPill(act.fan)}</div>
        <div class="status-row"><span style="color:#666">Värmare</span>${relayPill(act.heater)}</div>
        <div class="status-row"><span style="color:#666">Drive-synk</span>
          <span class="pill ${sys.drive_sync_status==='synced'?'pill-active':'pill-done'}">${sys.drive_sync_status==='synced'?'Synkad':'Ej synkad'}</span>
        </div>
        <div class="status-row"><span style="color:#666">Drifttid</span>
          <span style="font-weight:500;color:#1a1a1a">${sys.uptime_hours.toFixed(1)} h</span>
        </div>
        <div class="status-row"><span style="color:#666">Läge</span>
          <span style="font-size:11px;color:${sys.simulation_mode?'#BA7517':'#1D9E75'}">${sys.simulation_mode?'SIMULATION':'HARDWARE'}</span>
        </div>
      </div>
    </div>

    <!-- Dagssammanfattning -->
    <div class="card span3">
      <div class="card-label">Dagssammanfattning — ${sum.date}</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:10px">
        ${[
          ['Lufttemp medel', fmt(sum.air_temp_avg_c)+'°C', fmt(sum.air_temp_min_c)+'–'+fmt(sum.air_temp_max_c)+'°C'],
          ['Vattentemp medel', fmt(sum.water_temp_avg_c)+'°C', ''],
          ['Fuktighet medel', fmt(sum.humidity_avg_pct,0)+'%', ''],
          ['pH medel', fmt(sum.ph_avg,1), ''],
          ['Lux medel', sum.lux_avg.toLocaleString('sv-SE'), 'lux'],
          ['Pump cykler', sum.pump_cycles, 'idag'],
        ].map(([label, val, sub]) => `
          <div style="background:#f5f5f3;border-radius:8px;padding:10px">
            <div style="font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em">${label}</div>
            <div style="font-size:20px;font-weight:500">${val}</div>
            ${sub ? `<div style="font-size:11px;color:#aaa">${sub}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── Fetch & auto-reload ───────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('sample_data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('error-banner').style.display = 'none';
    render(data);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.textContent = '⚠ Kunde inte ladda sample_data.json — ' + err.message +
      '. Öppna filen via en lokal webbserver (python3 -m http.server 8080) eller från NAS.';
  }
}

loadData();
setInterval(loadData, 30000); // Uppdatera var 30:e sekund
</script>
</body>
</html>
