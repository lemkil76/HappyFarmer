<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>HappyFarmer Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1e2430;
  --border:     #30363d;
  --text:       #e6edf3;
  --muted:      #7d8590;
  --green:      #3fb950;
  --green-dim:  #1a3d2b;
  --red:        #f85149;
  --red-dim:    #3d1a1a;
  --amber:      #d29922;
  --amber-dim:  #3d2f0a;
  --blue:       #58a6ff;
  --blue-dim:   #0d2040;
  --radius:     12px;
  --radius-sm:  8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 16px;
}

.dash {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  max-width: 980px;
  margin: 0 auto;
}

/* ── Kort ──────────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}

.card-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-label i { font-size: 11px; }

.card-val {
  font-size: 28px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.1;
}

.card-sub  { font-size: 12px; color: var(--muted); margin-top: 4px; }
.card-trend{ font-size: 12px; margin-top: 6px; }

/* ── Status-färger ─────────────────────────────────────────────────────────── */
.ok     { color: var(--green); }
.warn   { color: var(--amber); }
.danger { color: var(--red);   }

/* ── Grid-helpers ──────────────────────────────────────────────────────────── */
.span2 { grid-column: span 2; }
.span3 { grid-column: span 3; }

/* ── Horisontell bar ───────────────────────────────────────────────────────── */
.hbar {
  height: 6px;
  border-radius: 3px;
  background: var(--surface2);
  border: 1px solid var(--border);
  margin-top: 8px;
  overflow: hidden;
}

.hbar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

/* ── Pills ─────────────────────────────────────────────────────────────────── */
.pill {
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 600;
  border: 1px solid transparent;
}

.pill-active { background: var(--green-dim); color: var(--green); border-color: var(--green); }
.pill-done   { background: var(--surface2);  color: var(--muted); border-color: var(--border); }
.pill-next   { background: var(--blue-dim);  color: var(--blue);  border-color: var(--blue); }
.pill-warn   { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }

/* ── Header ────────────────────────────────────────────────────────────────── */
.header {
  grid-column: span 3;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0 10px;
  flex-wrap: wrap;
  gap: 10px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-left .logo { font-size: 22px; }

.header-left h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.header-meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.header-meta .sep { color: var(--border); }

/* ── Admin-knapp ───────────────────────────────────────────────────────────── */
.btn-admin {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--blue-dim);
  border: 1px solid var(--blue);
  border-radius: var(--radius-sm);
  color: var(--blue);
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  transition: opacity 0.2s;
}

.btn-admin:hover { opacity: 0.8; }

/* ── Sparkline ─────────────────────────────────────────────────────────────── */
.sparkline {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 38px;
  margin-top: 10px;
}

/* ── Avdelare ──────────────────────────────────────────────────────────────── */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 12px 0;
}

/* ── Schemarad ─────────────────────────────────────────────────────────────── */
.schedule-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.schedule-row:last-child { border-bottom: none; }

.state-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Statusrad ─────────────────────────────────────────────────────────────── */
.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}

.status-row:last-child { border-bottom: none; }

/* ── Tweet-kort ────────────────────────────────────────────────────────────── */
.tweet-card {
  border-left: 2px solid var(--blue);
  padding-left: 12px;
  margin-bottom: 12px;
}

.tweet-card:last-child { margin-bottom: 0; }
.tweet-text { font-size: 13px; color: var(--text); line-height: 1.6; }
.tweet-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Laddning & fel ────────────────────────────────────────────────────────── */
.loading {
  color: var(--muted);
  font-size: 13px;
  text-align: center;
  padding: 60px 0;
}

.error-banner {
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 12px;
  color: var(--red);
  grid-column: span 3;
  display: none;
}

/* ── Dagssammanfattning mini-kort ──────────────────────────────────────────── */
.sum-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
}

.sum-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.sum-val {
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}

.sum-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Responsiv ─────────────────────────────────────────────────────────────── */
@media (max-width: 680px) {
  .dash { grid-template-columns: 1fr 1fr; }
  .span2, .span3, .header { grid-column: span 2; }
}
</style>
</head>
<body>
<div class="dash" id="dash">
  <div class="span3 loading" id="loading">
    <i class="fa-solid fa-seedling fa-spin" style="font-size:24px;color:var(--green);margin-bottom:10px;display:block"></i>
    Laddar data…
  </div>
  <div class="error-banner" id="error-banner"></div>
</div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────

function fmt(val, decimals=1, fallback='–') {
  return val !== null && val !== undefined ? Number(val).toFixed(decimals) : fallback;
}

function statusColor(val, min, max) {
  if (val === null || val === undefined) return '';
  if (val < min) return 'warn';
  if (val > max) return 'danger';
  return 'ok';
}

function statusDot(val, min, max) {
  const c = statusColor(val, min, max);
  const icons = {
    ok:     '<i class="fa-solid fa-circle-check"></i> Normal',
    warn:   '<i class="fa-solid fa-triangle-exclamation"></i> För lågt',
    danger: '<i class="fa-solid fa-circle-exclamation"></i> För högt',
    '':     '<i class="fa-regular fa-circle"></i> Okänd',
  };
  return `<span class="${c}" style="font-size:12px">${icons[c]}</span>`;
}

function pillClass(status) {
  if (status === 'active') return 'pill-active';
  if (status === 'done')   return 'pill-done';
  return 'pill-next';
}

function pillLabel(status) {
  if (status === 'active') return '<i class="fa-solid fa-circle-play"></i> Aktiv';
  if (status === 'done')   return '<i class="fa-solid fa-check"></i> Klar';
  return '<i class="fa-solid fa-clock"></i> Nästa';
}

function relayPill(state) {
  const on = state === 'on';
  return `<span class="pill ${on ? 'pill-active' : 'pill-done'}">${on ? '<i class="fa-solid fa-power-off"></i> ON' : '<i class="fa-solid fa-xmark"></i> OFF'}</span>`;
}

function sparkline(values, color) {
  if (!values || !values.length) return '';
  const max = Math.max(...values);
  const min = Math.min(...values);
  const range = max - min || 1;
  return values.map(v => {
    const h = Math.round(8 + ((v - min) / range) * 30);
    return `<div style="flex:1;height:${h}px;border-radius:2px 2px 0 0;background:${color};opacity:0.8"></div>`;
  }).join('');
}

function formatTimestamp(iso) {
  if (!iso) return '–';
  const d = new Date(iso);
  return d.toLocaleString('sv-SE', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatDate(iso) {
  if (!iso) return '–';
  return new Date(iso).toLocaleString('sv-SE', {
    weekday: 'short', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

// ── Render ────────────────────────────────────────────────────────────────────

function render(d) {
  const r    = d.current_readings;
  const thr  = d.thresholds;
  const act  = d.actuator_states;
  const sys  = d.system;
  const img  = d.latest_image;
  const sch  = d.light_schedule;
  const soc  = d.social_media;
  const his  = d.sensor_history;
  const pump = d.pump_schedule;
  const sum  = d.daily_summary || {};

  const syncOk = sys.drive_sync_status === 'synced';

  document.getElementById('dash').innerHTML = `

    <!-- ── Header ──────────────────────────────────────────────────────────── -->
    <div class="header">
      <div class="header-left">
        <span class="logo">🌿</span>
        <div>
          <h1>HappyFarmer</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="header-meta">
          <span><i class="fa-regular fa-clock" style="color:var(--muted)"></i> ${formatDate(r.timestamp)}</span>
          <span class="sep">|</span>
          <span>Loop&nbsp;<strong>#${sys.loop_count.toLocaleString('sv-SE')}</strong></span>
          <span class="sep">|</span>
          <span class="${syncOk ? 'ok' : 'danger'}">
            <i class="fa-solid fa-${syncOk ? 'circle-check' : 'triangle-exclamation'}"></i>
            ${syncOk ? 'Synkad' : 'Ej synkad'}
          </span>
        </div>
        <a href="http://rasp:5000/admin" class="btn-admin">
          <i class="fa-solid fa-sliders"></i> Admin
        </a>
      </div>
    </div>

    <!-- ── Senaste bild ─────────────────────────────────────────────────────── -->
    <div class="card span2">
      <div class="card-label"><i class="fa-solid fa-camera"></i> Senaste bild</div>
      <div style="width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border)">
        <img src="dashboard/latest_image.jpg?t=${Date.now()}"
          style="width:100%;height:100%;object-fit:cover;display:block">
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">
        <i class="fa-regular fa-clock"></i>
        Tagen: ${new Date().toLocaleString('sv-SE', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
      </div>
    </div>

    <!-- ── Lufttemp + Vattentemp ────────────────────────────────────────────── -->
    <div class="card" style="display:flex;flex-direction:column;gap:0">
      <div>
        <div class="card-label"><i class="fa-solid fa-temperature-half"></i> Lufttemperatur</div>
        <div class="card-val">${fmt(r.air_temperature_c)}<span style="font-size:16px;color:var(--muted)">°C</span></div>
        <div class="card-sub"><i class="fa-solid fa-droplet" style="color:var(--blue)"></i> Fuktighet: ${fmt(r.humidity_pct, 0)}%</div>
        <div class="card-trend">${statusDot(r.air_temperature_c, thr.temp_min_c, thr.temp_max_c)}</div>
        <div class="sparkline">${sparkline(his.air_temperature_c, '#f85149')}</div>
      </div>
      <hr class="divider">
      <div>
        <div class="card-label"><i class="fa-solid fa-water"></i> Vattentemperatur</div>
        <div class="card-val">${fmt(r.water_temperature_c)}<span style="font-size:16px;color:var(--muted)">°C</span></div>
        <div class="card-sub"><i class="fa-solid fa-flask" style="color:var(--green)"></i> pH: ${fmt(r.ph, 1)}</div>
        <div class="card-trend">${statusDot(r.water_temperature_c, thr.temp_min_c, thr.temp_max_c)}</div>
        <div class="sparkline">${sparkline(his.water_temperature_c, '#58a6ff')}</div>
      </div>
    </div>

    <!-- ── Lux + Fuktighet ─────────────────────────────────────────────────── -->
    <div class="card">
      <div class="card-label"><i class="fa-solid fa-sun"></i> Luxtal</div>
      <div class="card-val">${r.lux !== null ? r.lux.toLocaleString('sv-SE') : '–'}</div>
      <div class="card-sub">
        ${r.lux_description}
        &nbsp;—&nbsp;
        <span class="${act.grow_lights === 'on' ? 'ok' : 'danger'}">
          <i class="fa-solid fa-lightbulb"></i> ${act.grow_lights === 'on' ? 'ON' : 'OFF'}
        </span>
      </div>
      <div class="hbar">
        <div class="hbar-fill" style="width:${Math.min(100, Math.round((r.lux/thr.lux_max)*100))}%;background:#d29922"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--muted)">
        <span>0</span><span>${thr.lux_max.toLocaleString('sv-SE')} lux</span>
      </div>

      <hr class="divider">

      <div class="card-label"><i class="fa-solid fa-droplet"></i> Luftfuktighet</div>
      <div class="card-val">${fmt(r.humidity_pct, 0)}<span style="font-size:16px;color:var(--muted)">%</span></div>
      <div class="hbar" style="margin-top:8px">
        <div class="hbar-fill" style="width:${Math.min(100, Math.round(r.humidity_pct))}%;background:#58a6ff"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--muted)">
        <span>0%</span>
        <span class="${statusColor(r.humidity_pct, thr.humidity_min_pct, thr.humidity_max_pct)}">${fmt(r.humidity_pct,0)}%</span>
        <span>100%</span>
      </div>
    </div>

    <!-- ── Pump & ljusschema ────────────────────────────────────────────────── -->
    <div class="card">
      <div class="card-label"><i class="fa-solid fa-clock"></i> Pump &amp; ljusschema</div>
      ${sch.today.map(s => `
        <div class="schedule-row">
          <span class="state-dot" style="background:${
            s.status==='active' ? 'var(--green)' :
            s.status==='done'   ? 'var(--border)' :
            'var(--amber)'}"></span>
          <span style="flex:1;color:var(--muted);font-size:12px">${s.start}–${s.end}</span>
          <span style="color:var(--muted);font-size:11px;flex:1">${s.label}</span>
          <span class="pill ${pillClass(s.status)}">${pillLabel(s.status)}</span>
        </div>
      `).join('')}

      <hr class="divider">

      <div style="display:flex;flex-direction:column;gap:5px">
        ${[
          ['fa-play',        'Pump ON',           pump.on_seconds/60 + ' min'],
          ['fa-wind',        'Luftning (pump av)', pump.off_seconds/60 + ' min'],
          ['fa-forward',     'Nästa cykel om',    pump.next_cycle_in_minutes + ' min'],
          ['fa-rotate',      'Cykler idag',       pump.cycles_today],
        ].map(([icon, label, val]) => `
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px">
            <span style="color:var(--muted)"><i class="fa-solid ${icon}" style="width:14px"></i> ${label}</span>
            <span style="font-weight:600;color:var(--text)">${val}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- ── Senaste inlägg ───────────────────────────────────────────────────── -->
    <div class="card span2">
      <div class="card-label">
        <i class="fa-brands fa-x-twitter"></i> ${soc.platform} &nbsp;
        <span style="font-size:11px;color:var(--blue);font-weight:400">${soc.handle}</span>
      </div>
      ${soc.recent_posts.length ? soc.recent_posts.map(p => `
        <div class="tweet-card">
          <div class="tweet-text">${p.text.replace(/\n/g,'<br>').replace(/#(\w+)/g,'<span style="color:var(--blue)">#$1</span>')}</div>
          <div class="tweet-meta">
            <i class="fa-regular fa-clock"></i> ${formatTimestamp(p.posted_at)}
            ${p.likes ? `&nbsp;·&nbsp;<i class="fa-solid fa-heart" style="color:var(--red)"></i> ${p.likes}` : ''}
            ${p.retweets ? `&nbsp;·&nbsp;<i class="fa-solid fa-retweet" style="color:var(--green)"></i> ${p.retweets}` : ''}
          </div>
        </div>
      `).join('') : `<div style="color:var(--muted);font-size:13px;padding:10px 0"><i class="fa-regular fa-comment"></i> Inga inlägg än</div>`}
    </div>

    <!-- ── Systemstatus ─────────────────────────────────────────────────────── -->
    <div class="card">
      <div class="card-label"><i class="fa-solid fa-microchip"></i> Systemstatus</div>
      <div style="display:flex;flex-direction:column;gap:0;margin-top:4px">
        ${[
          ['fa-water',            'Pump',        relayPill(act.pump)],
          ['fa-sun',              'Odlingsljus', relayPill(act.grow_lights)],
          ['fa-wind',             'Fläkt',       relayPill(act.fan)],
          ['fa-fire',             'Värmare',      relayPill(act.heater)],
        ].map(([icon, label, pill]) => `
          <div class="status-row">
            <span style="color:var(--muted)"><i class="fa-solid ${icon}" style="width:16px"></i> ${label}</span>
            ${pill}
          </div>
        `).join('')}
        <div class="status-row">
          <span style="color:var(--muted)"><i class="fa-solid fa-cloud-arrow-up" style="width:16px"></i> Synk</span>
          <span class="pill ${syncOk ? 'pill-active' : 'pill-warn'}">${syncOk ? '<i class="fa-solid fa-check"></i> Synkad' : '<i class="fa-solid fa-triangle-exclamation"></i> Ej synkad'}</span>
        </div>
        <div class="status-row">
          <span style="color:var(--muted)"><i class="fa-solid fa-stopwatch" style="width:16px"></i> Drifttid</span>
          <span style="font-weight:600;color:var(--text)">${sys.uptime_hours.toFixed(1)} h</span>
        </div>
        <div class="status-row">
          <span style="color:var(--muted)"><i class="fa-solid fa-gear" style="width:16px"></i> Läge</span>
          <span style="font-size:11px;font-weight:600;color:${sys.simulation_mode ? 'var(--amber)' : 'var(--green)'}">
            ${sys.simulation_mode ? '⚠ SIMULATION' : '✓ HARDWARE'}
          </span>
        </div>
      </div>
    </div>

    <!-- ── Dagssammanfattning ───────────────────────────────────────────────── -->
    <div class="card span3">
      <div class="card-label">
        <i class="fa-solid fa-calendar-day"></i> Dagssammanfattning
        <span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:4px">${sum.date}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:10px">
        ${[
          ['fa-temperature-half', 'Lufttemp',    fmt(sum.air_temp_avg_c)+'°C',   fmt(sum.air_temp_min_c)+'–'+fmt(sum.air_temp_max_c)+'°C'],
          ['fa-water',            'Vattentemp',  fmt(sum.water_temp_avg_c)+'°C', ''],
          ['fa-droplet',          'Fuktighet',   fmt(sum.humidity_avg_pct,0)+'%',''],
          ['fa-flask',            'pH',          fmt(sum.ph_avg,1),              ''],
          ['fa-sun',              'Lux',         sum.lux_avg != null ? sum.lux_avg.toLocaleString('sv-SE') : '–', 'lux'],
          ['fa-rotate',           'Pump',        sum.pump_cycles,                'cykler'],
        ].map(([icon, label, val, sub]) => `
          <div class="sum-card">
            <div class="sum-label"><i class="fa-solid ${icon}"></i> ${label}</div>
            <div class="sum-val">${val}</div>
            ${sub ? `<div class="sum-sub">${sub}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ── Fetch & auto-reload ───────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch('dashboard/sample_data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('error-banner').style.display = 'none';
    render(data);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Kunde inte ladda sample_data.json — ' + err.message;
  }
}

loadData();
setInterval(loadData, 30000);            // Data var 30:e sekund

// Ladda om data direkt när fliken/skärmen blir aktiv igen
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadData();
});
</script>
</body>
</html>
